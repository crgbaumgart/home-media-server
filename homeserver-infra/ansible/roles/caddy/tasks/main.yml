---
- name: Install Caddy dependencies
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
    state: present

- name: Add Caddy GPG key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy repository
  apt_repository:
    repo: "deb [trusted=yes] https://apt.fury.io/caddy/ /"
    state: present

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: true

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: Restart Caddy

- name: Start and enable Caddy
  systemd:
    name: caddy
    state: started
    enabled: true

- name: Flush handlers
  meta: flush_handlers

- name: Verify Caddy is running
  command: systemctl is-active caddy
  register: caddy_status
  changed_when: false
  failed_when: caddy_status.stdout != "active"